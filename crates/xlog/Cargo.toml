[package]
name = "mars-xlog"
version = "0.1.0"
edition = "2021"
license = "MIT"

[lib]
crate-type = ["rlib"]

[dependencies]
libc = { workspace = true }
thiserror = { workspace = true }
mars-xlog-sys = { path = "../xlog-sys" }
tracing = { version = "0.1", optional = true }
tracing-subscriber = { version = "0.3", default-features = false, features = ["registry", "std"], optional = true }

[features]
default = ["ffi-backend"]
# 当前默认后端：FFI（C++ Mars）
ffi-backend = []
# Rust 后端在后续 phase 落地；暂时复用 ffi-backend 以保持行为不变
rust-backend = ["ffi-backend"]
# 控制是否启用 Rust 侧便捷宏
macros = []
tracing = ["dep:tracing", "dep:tracing-subscriber"]
