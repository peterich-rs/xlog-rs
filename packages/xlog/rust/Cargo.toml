[package]
name = "xlog_dart_native"
version = "0.1.0"
edition = "2021"
publish = false
rust-version = "1.92"

[lib]
crate-type = ["staticlib", "cdylib"]

[workspace]

[features]
default = ["metrics-prometheus"]
metrics-prometheus = []

[dependencies]
mars-xlog = { path = "../../../crates/xlog", default-features = false, features = ["rust-backend", "metrics-prometheus"] }
mars-xlog-core = { path = "../../../crates/xlog-core" }
metrics-exporter-prometheus = { version = "0.13.1", default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
